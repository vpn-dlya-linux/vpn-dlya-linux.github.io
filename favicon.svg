<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B1FBE"/>
      <stop offset="100%" stop-color="#00C4A3"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C77DFF"/>
      <stop offset="100%" stop-color="#00E5BE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Penguin body -->
  <ellipse cx="16" cy="22.5" rx="7.5" ry="7" fill="#0D0420"/>
  <!-- Glowing belly -->
  <ellipse cx="16" cy="23.5" rx="4.8" ry="4.8" fill="url(#belly)" opacity="0.92" filter="url(#glow)"/>
  <!-- Head -->
  <circle cx="16" cy="11.5" r="6" fill="#0D0420"/>
  <!-- Eyes (white + pupil) -->
  <circle cx="13.8" cy="10.5" r="1.5" fill="white"/>
  <circle cx="18.2" cy="10.5" r="1.5" fill="white"/>
  <circle cx="14.1" cy="10.8" r="0.65" fill="#0D0420"/>
  <circle cx="18.5" cy="10.8" r="0.65" fill="#0D0420"/>
  <!-- Shine on eyes -->
  <circle cx="14.6" cy="10.2" r="0.3" fill="white" opacity="0.6"/>
  <circle cx="19.0" cy="10.2" r="0.3" fill="white" opacity="0.6"/>
  <!-- Beak -->
  <ellipse cx="16" cy="13.6" rx="2.1" ry="1.2" fill="#FFB800" filter="url(#glow)"/>
  <!-- Feet -->
  <ellipse cx="12.5" cy="29.8" rx="3" ry="1.3" fill="#FFB800"/>
  <ellipse cx="19.5" cy="29.8" rx="3" ry="1.3" fill="#FFB800"/>
</svg>
